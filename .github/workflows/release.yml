name: release
# Push a tag like v0.2.0 → tests run → package builds → publishes to PyPI via
# trusted publishing (OIDC, no token secrets) → GitHub release created.
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check openthomas tests
      - run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openthomas/
    permissions:
      id-token: write # PyPI trusted publishing
      contents: write # GitHub release creation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag must match pyproject version
        run: |
          V=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $V"
            exit 1
          fi
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release (skipped if it already exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes || true
